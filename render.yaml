# Render Blueprint options for DATAALPHA AI
# Docs: https://render.com/docs/blueprint-spec

services:
  # Preferred if you use Static Site
  - type: web
    name: DATAALPHA-ai-subscribe
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
